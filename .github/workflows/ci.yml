name: Build and Push to Harbor

on:
  push:
    branches:
      - main

concurrency:
  group: docker-push-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ${{ secrets.HARBOR_HOST }}
  HARBOR_PROJECT: devdrill
  IMAGE_NAME: devdrill-batch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}
          tags: |
            # sha 태그만 생성 (latest 등 생략)
            type=sha,format=short,prefix=sha-

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.slim
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update GitOps Image Tag
        env:
          GITOPS_OWNER: ${{ secrets.GITOPS_OWNER }}
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
          GITOPS_REPONAME: ${{ secrets.GITOPS_REPONAME }}
          NEW_TAG: ${{ steps.meta.outputs.version }}
        run: |
          # 1. GitOps 레포지토리 클론
          git clone https://x-access-token:${GITOPS_TOKEN}@github.com/${{ env.GITOPS_OWNER }}/${{ env.GITOPS_REPONAME }}.git gitops-temp
          cd gitops-temp

          # 2. 이미지 태그 업데이트 (경로: cluster/workload/devdrill-api/deployment.yaml)
          sed -i "s|image: ${{ env.REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:.*|image: ${{ env.REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ env.NEW_TAG }}|g" cluster/workload/devdrill-api/deployment.yaml

          # 3. 변경사항 커밋 및 푸시
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "chore: update devdrill-api image tag to ${{ env.NEW_TAG }} [skip ci]"
            git push origin main
          else
            echo "변경 사항 없음"
          fi
